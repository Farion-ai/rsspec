name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default token permissions (supply-chain hardening)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RSSPEC_FAIL_ON_FOCUS: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned SHA; toolchain set via input
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Verify every feature combination compiles — the `parallel` feature
      # changes trait bounds, so each {parallel, tokio, googletest} combo must
      # be checked, not just the all-on / all-off extremes.
      - name: Feature matrix check
        run: |
          cargo install cargo-hack --locked
          cargo hack --feature-powerset check --all-targets

      - name: Test
        run: cargo test --all-features
        env:
          # Run the trybuild UI tests here (current stable) but not on MSRV,
          # where the compiler's diagnostic rendering may differ.
          RSSPEC_UI_TESTS: "1"

      - name: Test (no default features)
        run: cargo test --no-default-features

      - name: Security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency licenses and bans
        uses: EmbarkStudios/cargo-deny-action@34899fc7ba81ca6268d5947a7a16b4649013fea1 # v2.0.11

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned SHA; toolchain set via input
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Test on MSRV
        run: cargo test --all-features
