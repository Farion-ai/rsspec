name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default token permissions (supply-chain hardening)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RSSPEC_FAIL_ON_FOCUS: "1"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de88 # stable @ 2026-03
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Test (no default features)
        run: cargo test

      - name: Security audit
        uses: rustsec/audit-check@60938257f43cbff4e81b76dc3ba0aad74cfcc7b1 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dependency licenses and bans
        uses: EmbarkStudios/cargo-deny-action@34899fc7eeb48ca4d2b883e5c93f53e7fc45e6e2 # v2.0.11

  msrv:
    name: MSRV (1.82)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de88 # 1.82
        with:
          toolchain: "1.82"
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8

      - name: Test on MSRV
        run: cargo test --all-features
